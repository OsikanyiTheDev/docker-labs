<!DOCTYPE html>
<html>
<head>
    <title>Lab 5 Flask + MySQL</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

    <div class="container">
        <h1>📚 Students Database</h1>

        <table>
            <tr>
                <th>ID</th>
                <th>Name</th>
            </tr>

            {% for student in students %}
            <tr>
                <td>{{ student[0] }}</td>
                <td>{{ student[1] }}</td>
            </tr>
            {% endfor %}

        </table>
    </div>

</body>
</html>
