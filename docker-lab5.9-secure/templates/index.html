<!DOCTYPE html>
<html>
<head>
    <title>Lab 5 Flask + MySQL</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="container">
    <h1>📚 Students Database</h1>

    <!-- SEARCH FORM -->
    <form method="GET" action="/" class="search-form">
        <input type="text" name="search" placeholder="Search student..." value="{{ search or '' }}">
        <button type="submit">Search</button>
        <a href="/">Reset</a>
    </form>

    <!-- ADD FORM -->
    <form action="/add" method="POST" class="form">
        <input type="text" name="name" placeholder="Enter student name" required>
        <button type="submit">Add Student</button>
    </form>

    <table>
        <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Actions</th>
        </tr>

        {% for student in students %}
        <tr>
            <td>{{ student[0] }}</td>
            <td>{{ student[1] }}</td>
            <td>
                <a href="/edit/{{ student[0] }}">✏️ Edit</a> |
                <a href="/delete/{{ student[0] }}" onclick="return confirm('Delete this student?')">
                    🗑️ Delete
                </a>
            </td>
        </tr>
        {% endfor %}

    </table>

</div>

</body>
</html>
